services:
  actual-budget:
    image: docker.io/actualbudget/actual-server:26.7.0
    container_name: actual-budget
    restart: unless-stopped
    volumes:
      - /home/calebh/app-data/actual:/data
    networks:
      traefik:
    healthcheck:
      # Enable health check for the instance
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      traefik.enable: true
      traefik.docker.network: traefik
      # HTTP
      traefik.http.routers.actual-http.rule: Host(`budget.apps.husovich.com`)
      traefik.http.routers.actual-http.entrypoints: http
      traefik.http.routers.actual-http.service: actual
      traefik.http.routers.actual-http.middlewares: redirect-https
      # HTTP Redirect
      traefik.http.middlewares.redirect-https.redirectScheme.scheme: https
      traefik.http.middlewares.redirect-https.redirectScheme.permanent: true
      # HTTPS
      traefik.http.routers.actual-https.rule: Host(`budget.apps.husovich.com`)
      traefik.http.routers.actual-https.entrypoints: https
      traefik.http.routers.actual-https.service: actual
      traefik.http.routers.actual-https.tls: true
      traefik.http.routers.actual-https.tls.certresolver: myresolver
      # Load Balancer
      traefik.http.services.actual.loadbalancer.server.port: 5006
networks:
  traefik:
    external: true
