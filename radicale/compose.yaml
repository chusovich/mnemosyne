services:
  radicale:
    image: tomsquest/docker-radicale:3.6.1.0
    container_name: radicale
    restart: unless-stopped
    ports:
      - 5232:5232
    volumes:
      - /home/mnemosyne/app-data/radicale:/data
    networks:
      traefik:
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      # HTTP
      - traefik.http.routers.radicale-http.rule=Host(`calendar.apps.husovich.com`)
      - traefik.http.routers.radicale-http.entrypoints=http
      - traefik.http.routers.radicale-http.service=radicale
      - traefik.http.routers.radicale-http.middlewares=redirect-https
      # HTTP Redirect
      - traefik.http.middlewares.redirect-https.redirectScheme.scheme=https
      - traefik.http.middlewares.redirect-https.redirectScheme.permanent=true
      # HTTPS
      - traefik.http.routers.radicale-https.rule=Host(`calendar.apps.husovich.com`)
      - traefik.http.routers.radicale-https.entrypoints=https
      - traefik.http.routers.radicale-https.service=radicale
      - traefik.http.routers.radicale-https.tls=true
      - traefik.http.routers.radicale-https.tls.certresolver=myresolver
      # Load Balancer      
      - traefik.http.services.radicale.loadbalancer.server.port=5232

networks:
  traefik:
    external: true
